<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Redirect List - CRMLoriek</title>
    <link rel="stylesheet" th:href="@{/css/root.css}">
</head>
<body>
    <div class="container">
        <div class="nav">
            <a th:href="@{/}" class="btn btn-secondary">Home</a>
            <a th:href="@{/redirects/new}" class="btn">New Redirect</a>
        </div>

        <div class="card">
            <h1>Redirect List</h1>
            <table>
                <thead>
                    <tr>
                        <th>Short Link</th>
                        <th>Destination URL</th>
                        <th>Views</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="redirect : ${redirects}">
                        <td>
                            <a th:href="@{'/r/' + ${redirect.uudi}}" th:text="${'/r/' + redirect.uudi}" target="_blank"></a>
                        </td>
                        <td style="word-break: break-all;">
                            <span th:text="${redirect.url}"></span>
                        </td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" 
                                    th:onclick="'openModal(\'modal-' + ${redirect.log.id} + '\')'">
                                [[${#lists.size(redirect.log.views)}]] Views
                            </button>

                            <!-- Insert Modal Fragment for each redirect -->
                            <div th:replace="~{fragments/log_modal :: logModal(${redirect.log.id}, ${redirect.log.views})}"></div>
                        </td>
                    </tr>
                </tbody>
                </table>
                </div>
                </div>

                <!-- Include Modal Scripts -->
                <div th:replace="~{fragments/log_modal :: modalScripts}"></div>
                </body>
                </html>
