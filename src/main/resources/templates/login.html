<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - CRMLoriek</title>
    <link rel="stylesheet" th:href="@{/css/root.css}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="card login-card">
        <h1 style="text-align: center;">CRMLoriek</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Sign in to access your dashboard</p>
        
        <div th:if="${param.error}" class="card" style="background: var(--danger); color: white; padding: 0.5rem; text-align: center; margin-bottom: 1rem;">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="card" style="background: var(--accent); color: white; padding: 0.5rem; text-align: center; margin-bottom: 1rem;">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; padding: 0.75rem; margin-top: 1rem;">Login</button>
        </form>
    </div>
</body>
</html>
