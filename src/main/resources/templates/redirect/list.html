<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lista Redirect</title>
</head>
<body>
    <h1>Lista Redirect</h1>
        <ul>
            <li th:each="redirect : ${redirects}">
                <a th:href="${redirect.url}" th:text="${redirect.url}"></a>
            </li>
        </ul>
</body>
</html>
