<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tracking Logs - CRMLoriek</title>
    <link rel="stylesheet" th:href="@{/css/root.css}">
</head>
<body>
    <div class="container">
        <div class="nav">
            <a th:href="@{/}" class="btn btn-secondary">Home</a>
            <a th:href="@{/new-log}" class="btn">New Pixel</a>
        </div>

        <h1>Tracking Pixels</h1>

        <div th:each="log : ${logs}" class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>Pixel ID: [[${log.id}]]</h3>
                <div>
                    <button class="btn btn-secondary" style="font-size: 0.8rem; margin-right: 0.5rem;"
                            th:onclick="'openModal(\'modal-' + ${log.id} + '\')'">
                        View Details ([[${#lists.size(log.views)}]])
                    </button>
                    <span class="btn btn-secondary" style="font-size: 0.8rem;">Pixel ID: [[${log.id}]]</span>
                </div>
            </div>

            <div style="margin-bottom: 1rem;">
                <label>Tracking Pixel Link (Copy this):</label>
                <code style="background: var(--bg); padding: 0.5rem; display: block; border-radius: 4px; border: 1px solid var(--secondary);">
                    &lt;img src="/log/[[${log.id}]]/img" width="1" height="1" /&gt;
                </code>
            </div>

            <!-- Insert Modal Fragment -->
            <div th:replace="~{fragments/log_modal :: logModal(${log.id}, ${log.views})}"></div>
        </div>
        </div>

        <!-- Include Modal Scripts -->
        <div th:replace="~{fragments/log_modal :: modalScripts}"></div>
        </body>
        </html>
